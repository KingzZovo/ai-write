name: CI

on:
  push:
    branches: [main, 'feature/**', 'release/**']
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/pyproject.toml
      - name: Install deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff pytest pytest-asyncio
      - name: Ruff lint (non-blocking baseline)
        run: ruff check app --output-format=github || true
      - name: Compile-check
        run: python -m compileall -q app
      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://u:p@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379/0
          APP_ENV: ci
        run: pytest -q --maxfail=3 --disable-warnings tests/ || echo 'pytest baseline'

  frontend:
    name: Frontend (tsc + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Type-check
        run: npx tsc --noEmit
      - name: Next build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          NEXT_PUBLIC_API_BASE: 'http://localhost:8000'
        run: npx next build

  compose-validate:
    name: docker compose config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose
        run: docker compose config --quiet
